server:
  port: 8084

spring:
  application:
    name: media-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:mysql://localhost:3306/agrisense_media_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Ash@ni911
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

media:
  storage:
    mode: ${MEDIA_STORAGE_MODE:filesystem}
    bucket: ${MEDIA_STORAGE_BUCKET:}
    project-id: ${GCP_PROJECT_ID:}
    credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
    object-prefix: ${MEDIA_STORAGE_OBJECT_PREFIX:agrisense-media}
    public-base-url: ${MEDIA_STORAGE_PUBLIC_BASE_URL:https://storage.googleapis.com/${MEDIA_STORAGE_BUCKET}}
    upload-dir: uploads

management:
  endpoints:
    web:
      exposure:
        include: health,info,env


